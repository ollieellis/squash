<!-- templates/log_match_modal.html -->
<dialog id="matchModal">
    <form {% if user %}hx-post="/matches/" hx-target="#match-result" hx-on::after-request="if(event.detail.successful) document.getElementById('matchModal').close(); window.location.reload();" {% else %}action="/login" method="get"{% endif %}>
        <h3>Log Match</h3>
        
        <label for="player1_id">Player 1:</label>
        <select name="player1_id" id="player1_id" required>
            {% for profile in profiles_for_modal %}
            <option value="{{ profile.id }}" {% if user and user.id == profile.id %}selected{% endif %}>{{ profile.first_name }} {{ profile.last_name }}</option>
            {% endfor %}
        </select>

        <label for="player2_id">Player 2:</label>
        <select name="player2_id" id="player2_id" required>
            {% for profile in profiles_for_modal %}
            <option value="{{ profile.id }}" {% if user and user.id != profile.id and loop.index == 1 %}selected{% endif %}>{{ profile.first_name }} {{ profile.last_name }}</option>
            {% endfor %}
        </select>

        <label for="player1_score">Player 1 Games:</label>
        <input type="number" name="player1_score" id="player1_score" min="0" max="5" value="0" required>

        <label for="player2_score">Player 2 Games:</label>
        <input type="number" name="player2_score" id="player2_score" min="0" max="5" value="0" required>

        <label for="session_id">Session (Optional):</label>
        <select name="session_id" id="session_id">
            <option value="">-- None --</option>
            {% for s in sessions_for_modal %}
            <option value="{{ s.id }}" {% if preselected_session_id == s.id %}selected{% endif %}>
                {{ s.start_date.strftime('%Y-%m-%d %H:%M') }} @ {{ s.location }}
            </option>
            {% endfor %}
        </select>

        {% if not user %}
        <input type="hidden" name="next" value="/matches/">
        <button type="submit" style="background-color: #3498db;">Login to Log Match</button>
        {% else %}
        <button type="submit">Log Match</button>
        {% endif %}
        <button type="button" onclick="document.getElementById('matchModal').close()" style="background: none; border: none; color: #888;">Cancel</button>
    </form>
    <div id="match-result"></div>
</dialog>
<button onclick="document.getElementById('matchModal').showModal()">+ Log Match</button>

<script src="https://unpkg.com/htmx.org@1.9.10"></script>
